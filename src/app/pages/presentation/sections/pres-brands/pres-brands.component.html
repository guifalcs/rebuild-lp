<section class="pres-brands">
  <p class="pres-brands-label" appScrollReveal="fade-up">
    Empresas que confiam em nossa experiência
  </p>
  <div class="pres-brands-row" appScrollReveal="fade-up" [revealDelay]="0.1">
    <div *ngFor="let brand of brands" class="pres-brands-item" [attr.aria-label]="brand.name">
      <img [src]="brand.logo" [alt]="brand.name" class="pres-brands-logo" />
    </div>
  </div>
</section>

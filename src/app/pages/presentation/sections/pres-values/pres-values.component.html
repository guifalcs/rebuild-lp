<section class="pres-values">
  <div class="pres-values-header">
    <span class="pres-values-kicker" appScrollReveal="fade-up">Nossos valores</span>
    <h2 class="pres-values-title" appScrollReveal="fade-up" [revealDelay]="0.1">
      Os princípios que guiam
      <span class="pres-values-accent">cada entrega</span>.
    </h2>
  </div>

  <div class="pres-values-grid">
    <div
      *ngFor="let value of values; let i = index"
      class="pres-value-card"
      [attr.data-icon]="value.icon"
      appScrollReveal="fade-up"
      [revealDelay]="0.08 * i"
    >
      <div class="pres-value-icon" [attr.data-icon]="value.icon">
        <ng-container [ngSwitch]="value.icon">
          <svg *ngSwitchCase="'owner'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5v10a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-10z"/>
          </svg>
          <svg *ngSwitchCase="'innovation'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 3 2 5 3 7h8c1-2 3-4 3-7a7 7 0 0 0-7-7z"/>
          </svg>
          <svg *ngSwitchCase="'excellence'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <svg *ngSwitchCase="'transparency'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngSwitchCase="'learning'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
            <path d="M21 4v6h-6"/>
          </svg>
        </ng-container>
      </div>
      <span class="pres-value-number">0{{ i + 1 }}</span>
      <h3 class="pres-value-title">{{ value.title }}</h3>
      <p class="pres-value-description">{{ value.description }}</p>
      <div class="pres-value-glow"></div>
    </div>
  </div>
</section>

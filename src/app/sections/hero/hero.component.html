<section class="hero">
  <app-header></app-header>

  <!-- Decorative elements -->
  <div class="hero-gradient-orb hero-gradient-orb--purple"></div>
  <div class="hero-gradient-orb hero-gradient-orb--green"></div>
  <div class="hero-grid-pattern"></div>

  <div class="hero-content">
    <div class="hero-text">
      <span class="hero-badge"><span class="hero-badge-inner">Tecnologia | Eficiência</span></span>

      <h1 class="hero-title">
        <span class="hero-title-line">Potencializando resultados</span>
        <span class="hero-title-line">através da <span class="highlight-gradient">otimização inteligente</span></span>
        <span class="hero-title-line">de processos</span>
      </h1>

      <p class="hero-description">
        Uma consultoria de especialistas em tecnologia e <br /> focados na
        maximização da eficiência operacional.
      </p>

      <div class="hero-buttons">
        <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
          <span>Começar Projeto</span>
        </a>
        <a routerLink="/apresentacao" class="btn btn-secondary btn-tertiary">
          <span>Ver apresentação completa</span>
        </a>
      </div>
    </div>
  </div>
</section>
